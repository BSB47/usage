name: Keep Streamlit App Awake

on:
  schedule:
    # Runs at 00:00 UTC every day (Adjust as needed)
    - cron: '0 0 * * *'
  # Allows you to manually trigger the action from the GitHub UI to test it
  workflow_dispatch:

jobs:
  ping_app:
    runs-on: ubuntu-latest
    steps:
      - name: Send a request to the Streamlit app
        run: |
          curl -sI https://your-app-url.streamlit.app | head -n 1
