name: Keep Streamlit App Awake

on:
  schedule:
    # Runs every 8 hours
    - cron: '0 */8 * * *'
  # Allows you to manually trigger the action from the GitHub UI to test it
  workflow_dispatch:

jobs:
  ping_app:
    runs-on: ubuntu-latest
    steps:
      - name: Wake up Streamlit App
        run: |
          # Give the app a firm nudge (this triggers the backend to start spinning up the container)
          curl -s https://omaralab-usage.streamlit.app/ > response.html
          
          # Check if we got a valid response from the Streamlit hosting system
          if grep -q "Streamlit" response.html || grep -q "root" response.html; then
            echo "Successfully pinged the Streamlit router. App is waking up!"
          else
            echo "Warning: Unexpected response format."
            cat response.html | head -n 10
          fi
